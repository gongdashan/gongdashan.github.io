<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小山设计社 | 让每一次拥有,都更有意义</title>
  <meta name="description" content="小山设计社致力于将企业文创的部分收益捐赠到公益组织,让每一次拥有更有意义。" />

  <!-- Open Graph -->
  <meta property="og:title" content="小山设计社" />
  <meta property="og:description" content="让每一次拥有,都更有意义" />
  <meta property="og:type" content="website" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.1.0/style.css" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="assets/css/tokens.css" />
  <link rel="stylesheet" href="assets/css/main.css" />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="assets/images/logo.svg" />
</head>
<body>

  <!-- ============ 导航 ============ -->
  <header class="site-header">
    <nav class="nav container">
      <a href="index.html" class="nav__logo">
        <img src="assets/images/logo.svg" alt="小山设计社" />
        <span>小山设计社</span>
      </a>
      <button class="nav__toggle" aria-label="菜单" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav__menu">
        <li><a href="index.html">首页</a></li>
        <li><a href="pages/shop.html">义卖商品</a></li>
        <li><a href="pages/events.html">公益活动</a></li>
        <li><a href="pages/about.html">关于我们</a></li>
        <li><a href="pages/contact.html">联系我们</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <!-- ============ Hero ============ -->
    <section class="hero">
      <div class="container hero__inner">
        <h1 class="hero__title">让每一次拥有,<br />都更有意义</h1>
        <p class="hero__quote">"Good things may take longer. The path still holds."</p>
        <p class="hero__quote-cn">美好需要时间,路一直都在。</p>
        <div class="hero__cta">
          <a href="pages/shop.html" class="btn btn--primary">看看义卖商品</a>
          <a href="pages/about.html" class="btn btn--ghost">了解我们</a>
        </div>
      </div>
    </section>

    <!-- ============ Mission ============ -->
    <section class="mission container">
      <h2 class="section__title">我们在做的事</h2>
      <p class="mission__text" id="mission-text">加载中...</p>
    </section>

    <!-- ============ Featured Products ============ -->
    <section class="featured container">
      <div class="section__header">
        <h2 class="section__title">精选义卖</h2>
        <p class="section__subtitle">每一件,都带着温度</p>
      </div>

      <!-- 🔑 关键容器:JS 会把商品卡片插入这里 -->
      <div class="product-grid" id="featured-products">
        <p class="loading">商品加载中...</p>
      </div>

      <div class="section__footer">
        <a href="pages/shop.html" class="btn btn--ghost">查看全部商品 →</a>
      </div>
    </section>

    <!-- ============ Recent Events ============ -->
    <section class="events container">
      <div class="section__header">
        <h2 class="section__title">近期活动</h2>
        <p class="section__subtitle">那些温柔发生过的事</p>
      </div>
      <div class="event-grid" id="recent-events">
        <p class="loading">活动加载中...</p>
      </div>
    </section>
  </main>

  <!-- ============ Footer ============ -->
  <footer class="site-footer">
    <div class="container">
      <p>© 2026 小山设计社 · 让每一次拥有,都更有意义</p>
    </div>
  </footer>

  <!-- 🔑 关键:必须是 type="module" -->
  <script type="module" src="assets/js/main.js"></script>
</body>
</html>
