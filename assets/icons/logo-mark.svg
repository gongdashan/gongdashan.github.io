<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="小山设计社">
  <title>小山设计社</title>
  <defs>
    <linearGradient id="markGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#E87A5D"/>
      <stop offset="100%" stop-color="#F4A48E"/>
    </linearGradient>
  </defs>

  <!-- 圆形背景 -->
  <circle cx="32" cy="32" r="30" fill="#FFF9F2" stroke="#E87A5D" stroke-width="1.5"/>

  <g transform="translate(4, 8)">
    <!-- 左小山 -->
    <path d="M 4 46 L 18 24 L 32 46 Z"
          fill="url(#markGrad)" opacity="0.85"/>
    <!-- 右小山 -->
    <path d="M 28 46 L 42 28 L 56 46 Z"
          fill="url(#markGrad)" opacity="0.9"/>
    <!-- 中间大山 -->
    <path d="M 14 46 L 32 16 L 50 46 Z"
          fill="url(#markGrad)"/>
    <!-- 山顶雪线 -->
    <path d="M 27 24 L 32 16 L 37 24 L 34 26 L 32 23 L 30 26 Z"
          fill="#FFF9F2" opacity="0.7"/>
    <!-- 山顶爱心 -->
    <path d="M 32 8
             C 30 5, 26 5, 26 9
             C 26 12, 32 15, 32 15
             C 32 15, 38 12, 38 9
             C 38 5, 34 5, 32 8 Z"
          fill="#F5C77E" stroke="#E87A5D" stroke-width="1"/>
  </g>
</svg>