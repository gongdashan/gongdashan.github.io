<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 64" role="img" aria-label="小山设计社">
  <title>小山设计社 Logo</title>
  <defs>
    <!-- 山形渐变：从深暖橘到浅暖橘 -->
    <linearGradient id="mountainGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#E87A5D"/>
      <stop offset="100%" stop-color="#F4A48E"/>
    </linearGradient>
  </defs>

  <!-- ===== 图标部分（左侧）===== -->
  <g transform="translate(8, 8)">
    <!-- 左小山 -->
    <path d="M 2 44 L 16 22 L 30 44 Z"
          fill="url(#mountainGrad)" opacity="0.85"/>
    <!-- 右小山 -->
    <path d="M 26 44 L 40 26 L 54 44 Z"
          fill="url(#mountainGrad)" opacity="0.9"/>
    <!-- 中间大山 -->
    <path d="M 12 44 L 30 14 L 48 44 Z"
          fill="url(#mountainGrad)"/>
    <!-- 山顶雪线（高光）-->
    <path d="M 25 22 L 30 14 L 35 22 L 32 24 L 30 21 L 28 24 Z"
          fill="#FFF9F2" opacity="0.7"/>
    <!-- 山顶爱心 -->
    <path d="M 30 6
             C 28 3, 24 3, 24 7
             C 24 10, 30 13, 30 13
             C 30 13, 36 10, 36 7
             C 36 3, 32 3, 30 6 Z"
          fill="#F5C77E" stroke="#E87A5D" stroke-width="0.8"/>
    <!-- 地平线 -->
    <line x1="0" y1="46" x2="56" y2="46"
          stroke="#3D2E2A" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- ===== 文字部分（右侧）===== -->
  <g transform="translate(76, 0)" fill="#3D2E2A">
    <text x="0" y="32"
          font-family="'LXGW WenKai', 'KaiTi', serif"
          font-size="24"
          font-weight="500"
          letter-spacing="2">小山设计社</text>
    <text x="0" y="50"
          font-family="'Manrope', sans-serif"
          font-size="9"
          font-weight="400"
          letter-spacing="3"
          fill="#7A6660">XIAOSHAN  DESIGN  SOCIETY</text>
  </g>
</svg>