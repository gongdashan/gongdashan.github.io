<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="商品图片占位">
  <defs>
    <linearGradient id="ph-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#FDF1E1"/>
      <stop offset="100%" stop-color="#FFF9F2"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#ph-bg)"/>

  <!-- 三座小山 + 爱心（与 Logo 呼应）-->
  <g transform="translate(80, 130)" opacity="0.85">
    <path d="M 10 180 L 70 90 L 130 180 Z" fill="#F4A48E"/>
    <path d="M 110 180 L 170 70 L 230 180 Z" fill="#E87A5D"/>
    <path d="M 90 180 L 175 30 L 240 180 Z" fill="#E87A5D"/>
    <path d="M 168 50 L 175 30 L 182 50 L 178 53 L 175 47 L 172 53 Z" fill="#FFF9F2" opacity="0.7"/>
    <!-- 山顶爱心 -->
    <path d="M 175 8 C 170 0, 162 0, 162 10
             C 162 16, 175 22, 175 22
             C 175 22, 188 16, 188 10
             C 188 0, 180 0, 175 8 Z"
          fill="#F5C77E" stroke="#E87A5D" stroke-width="1.5"/>
  </g>

  <text x="200" y="350" text-anchor="middle"
        font-family="-apple-system, sans-serif"
        font-size="14" fill="#B5A89F" letter-spacing="0.1em">
    商品图片即将上传
  </text>
</svg>